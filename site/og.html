<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>og</title>
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*{margin:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{
  background:oklch(0.135 0.025 265);
  background-image:
    radial-gradient(900px 480px at 78% -15%, oklch(0.28 0.070 285 / 0.4), transparent 62%),
    radial-gradient(700px 400px at -6% 105%, oklch(0.24 0.060 250 / 0.3), transparent 58%),
    radial-gradient(1.5px 1.5px at 160px 90px, rgba(255,255,255,.9), transparent 50%),
    radial-gradient(1px 1px at 420px 40px, rgba(255,255,255,.55), transparent 50%),
    radial-gradient(1px 1px at 760px 130px, rgba(255,255,255,.7), transparent 50%),
    radial-gradient(2px 2px at 1050px 70px, oklch(0.93 0.04 85 / 0.8), transparent 50%),
    radial-gradient(1px 1px at 940px 200px, rgba(255,255,255,.5), transparent 50%),
    radial-gradient(1.5px 1.5px at 260px 210px, rgba(255,255,255,.65), transparent 50%),
    radial-gradient(1px 1px at 640px 250px, rgba(255,255,255,.45), transparent 50%),
    radial-gradient(1px 1px at 1130px 320px, rgba(255,255,255,.6), transparent 50%);
  font-family:"Cabinet Grotesk",sans-serif; color:oklch(0.95 0.01 250);
  padding:72px 84px; display:flex; flex-direction:column; justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:14px;font-family:"Geist Mono",monospace;font-size:26px;font-weight:500}
.dot{width:16px;height:16px;border-radius:50%;background:oklch(0.80 0.135 74);box-shadow:0 0 26px 4px oklch(0.80 0.135 74 / 0.8)}
h1{font-size:86px;font-weight:800;letter-spacing:-0.02em;line-height:1.02}
h1 .a{color:oklch(0.80 0.135 74);display:block}
.block{font-family:"Geist Mono",monospace;font-size:24px;color:oklch(0.80 0.135 74);
  background:oklch(0.70 0.15 66 / 0.10);border:2px solid oklch(0.70 0.15 66 / 0.4);border-radius:12px;
  padding:18px 26px;display:inline-block;max-width:900px}
.foot{display:flex;justify-content:space-between;align-items:baseline;font-family:"Geist Mono",monospace;font-size:24px;color:oklch(0.745 0.02 255)}
.foot .u{color:oklch(0.80 0.135 74)}
</style>
</head>
<body>
  <div class="brand"><span class="dot"></span>nightshift</div>
  <h1>Your agent remembers what it shipped.<span class="a">It forgets what it thought.</span></h1>
  <div class="block">[nightshift] ⛔ turn can't end on a receipt — what did you figure out?</div>
  <div class="foot"><span>an encrypted work journal for AI coding agents</span><span class="u">night-shift.sh</span></div>
</body>
</html>
